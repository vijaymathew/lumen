name: Release

# Build ready-to-run, dependency-bundled artifacts: an AppImage (Linux) and a
# .dmg (macOS). Runs on version tags (attaching the artifacts to the GitHub
# Release) and on manual dispatch (artifacts downloadable from the run).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release needs this to attach assets

jobs:
  linux-appimage:
    name: AppImage (Linux)
    # Build on the oldest supported runner for the widest glibc compatibility.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        # On a tag, the release version is the tag minus its leading "v"; on a
        # manual run, fall back to the project() version in CMakeLists.txt (the
        # first indented "VERSION x.y.z", skipping cmake_minimum_required).
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$(awk '/^[[:space:]]*VERSION[[:space:]]/{print $2; exit}' CMakeLists.txt)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "VERSION=$v" >> "$GITHUB_ENV"
          echo "Version: $v"

      - name: Install build + runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvips-dev libraw-dev liblensfun-dev liblensfun-data-v1 \
            liblcms2-dev ninja-build librsvg2-bin \
            libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          modules: 'qtshadertools'
          cache: true

      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel

      - name: Install into AppDir
        run: cmake --install build --prefix AppDir/usr

      - name: Bundle the Lensfun profile database
        # linuxdeploy copies liblensfun itself, but not its data. Without the
        # profiles the automatic corrections silently match nothing on any host
        # that lacks lensfun-data; ship them so the AppImage is self-contained.
        run: |
          src="$(pkg-config --variable=datadir lensfun)/lensfun/version_1"
          [ -d "$src" ] || { echo "::error::Lensfun profiles not found at $src"; exit 1; }
          mkdir -p AppDir/usr/share/lensfun
          cp -r "$src" AppDir/usr/share/lensfun/
          echo "Bundled $(ls AppDir/usr/share/lensfun/version_1/*.xml | wc -l) profile files"

      - name: Rasterise icon
        # linuxdeploy wants a raster icon for the AppImage's thumbnail (.DirIcon).
        run: rsvg-convert -w 256 -h 256 packaging/lumen.svg -o lumen.png

      - name: Fetch linuxdeploy + Qt plugin + appimagetool
        run: |
          base=https://github.com/linuxdeploy
          curl -fsSLO $base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSLO $base/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          # We package with appimagetool rather than linuxdeploy's own appimage
          # output plugin — see the pruning step below for why.
          curl -fsSLO https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage \
                   appimagetool-x86_64.AppImage

      - name: Populate the AppDir
        env:
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          # Extract-and-run avoids needing FUSE on the runner.
          APPIMAGE_EXTRACT_AND_RUN: '1'
          # Ship Qt's GTK platform theme (libqgtk3). Without it Qt falls back to
          # its built-in defaults — Sans Serif 9pt on a grey palette — instead of
          # the host's font and colours, a visible mismatch against a locally
          # built Lumen on any GTK desktop.
          DEPLOY_PLATFORM_THEMES: '1'
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --icon-file lumen.png \
            --desktop-file AppDir/usr/share/applications/lumen.desktop

      - name: Unbundle glib and GTK
        # libqgtk3 loads the *host's* libgtk-3, but its RUNPATH ($ORIGIN/../../lib)
        # resolves that GTK's glib inside the AppDir. A bundled glib is therefore
        # forced on a host GTK built against a newer one, and the theme dies with
        # "undefined symbol: g_task_set_static_name" — which is exactly how the
        # 22.04 glib (2.72) behaves on a 24.04-era desktop. Keeping one glib per
        # process means taking the host's: glib stays backward compatible, so the
        # bundled libvips/lensfun are fine on anything clearing our glibc floor,
        # and a host without GTK just falls back to Qt's built-in defaults.
        #
        # This has to happen after linuxdeploy: its own blacklist already skips
        # glib, but the qt plugin deploys it anyway, and --exclude-library does
        # not reach into the plugin.
        run: |
          cd AppDir/usr/lib
          rm -f libglib-2.0.so.0 libgio-2.0.so.0 libgobject-2.0.so.0 \
                libgmodule-2.0.so.0 libgthread-2.0.so.0 \
                libgtk-3.so.0 libgdk-3.so.0

      - name: Package the AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          ARCH: x86_64
        # appimagetool only packs what is in the AppDir. linuxdeploy's appimage
        # output plugin re-runs dependency deployment and would put glib straight
        # back in, undoing the step above.
        run: |
          ./appimagetool-x86_64.AppImage \
            AppDir Lumen-${{ steps.version.outputs.version }}-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumen-AppImage
          path: Lumen-${{ steps.version.outputs.version }}-x86_64.AppImage
          if-no-files-found: error

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        # Pull this version's section out of CHANGELOG.md (from its "## [x.y.z]"
        # heading up to the next section or the link-reference footer).
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && (/^## \[/ || /^\[[^]]*\]: /) { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Lumen-${{ steps.version.outputs.version }}-x86_64.AppImage
          body_path: RELEASE_NOTES.md

  macos-dmg:
    name: DMG (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        # Same rule as the Linux job: tag (minus "v") on a release, else the
        # project() version in CMakeLists.txt on a manual run.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$(awk '/^[[:space:]]*VERSION[[:space:]]/{print $2; exit}' CMakeLists.txt)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "VERSION=$v" >> "$GITHUB_ENV"
          echo "Version: $v"

      - name: Install libraries
        run: brew install vips libraw lensfun little-cms2 ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          modules: 'qtshadertools'
          cache: true

      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel

      - name: Install .app
        run: cmake --install build --prefix dist

      - name: Bundle dependencies + build DMG
        # macdeployqt copies the Qt frameworks and the Homebrew imaging dylibs
        # into the bundle and rewrites their load paths, then packs the .dmg.
        run: |
          "$QT_ROOT_DIR/bin/macdeployqt" dist/lumen.app -dmg
          mv dist/lumen.dmg "Lumen-${VERSION}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumen-dmg
          path: Lumen-${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        # This version's section of CHANGELOG.md (matches the Linux job so both
        # jobs attach the same body to the release).
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && (/^## \[/ || /^\[[^]]*\]: /) { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Lumen-${{ steps.version.outputs.version }}.dmg
          body_path: RELEASE_NOTES.md
