name: Release

# Build ready-to-run, dependency-bundled artifacts: an AppImage (Linux) and a
# .dmg (macOS). Runs on version tags (attaching the artifacts to the GitHub
# Release) and on manual dispatch (artifacts downloadable from the run).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release needs this to attach assets

jobs:
  linux-appimage:
    name: AppImage (Linux)
    # Build on the oldest supported runner for the widest glibc compatibility.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        # On a tag, the release version is the tag minus its leading "v"; on a
        # manual run, fall back to the project() version in CMakeLists.txt (the
        # first indented "VERSION x.y.z", skipping cmake_minimum_required).
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$(awk '/^[[:space:]]*VERSION[[:space:]]/{print $2; exit}' CMakeLists.txt)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "VERSION=$v" >> "$GITHUB_ENV"
          echo "Version: $v"

      - name: Install build + runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvips-dev libraw-dev liblensfun-dev liblensfun-data-v1 \
            liblcms2-dev ninja-build librsvg2-bin \
            libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          modules: 'qtshadertools'
          cache: true

      - name: Fetch ONNX Runtime (CPU)
        # Microsoft's prebuilt CPU runtime — a single shared lib we bundle into
        # the AppImage so AI demosaicing works without a system ORT install.
        env:
          ORT_VERSION: '1.20.1'
        run: |
          curl -fsSLO "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          tar xf "onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          echo "ONNXRUNTIME_ROOT=$PWD/onnxruntime-linux-x64-${ORT_VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DLUMEN_AI_DEMOSAIC=ON -DONNXRUNTIME_ROOT="$ONNXRUNTIME_ROOT"
          cmake --build build --parallel

      - name: Install into AppDir
        run: cmake --install build --prefix AppDir/usr

      - name: Rasterise icon
        # linuxdeploy wants a raster icon for the AppImage's thumbnail (.DirIcon).
        run: rsvg-convert -w 256 -h 256 packaging/lumen.svg -o lumen.png

      - name: Fetch linuxdeploy + Qt plugin
        run: |
          base=https://github.com/linuxdeploy
          curl -fsSLO $base/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSLO $base/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        env:
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          # Extract-and-run avoids needing FUSE on the runner.
          APPIMAGE_EXTRACT_AND_RUN: '1'
          OUTPUT: Lumen-${{ steps.version.outputs.version }}-x86_64.AppImage
        run: |
          # linuxdeploy follows the binary's NEEDED libs; libonnxruntime.so is in
          # AppDir/usr/lib (installed above) and on LD_LIBRARY_PATH so it resolves.
          export LD_LIBRARY_PATH="$ONNXRUNTIME_ROOT/lib:${LD_LIBRARY_PATH:-}"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --icon-file lumen.png \
            --desktop-file AppDir/usr/share/applications/lumen.desktop \
            --output appimage

      - name: Verify ONNX Runtime is bundled
        # A flag-on build that shipped without libonnxruntime would crash the
        # first time a user picked "AI" demosaic. Extract the AppImage (built-in,
        # no FUSE needed) and fail the release loudly if the lib is missing.
        run: |
          out="Lumen-${{ steps.version.outputs.version }}-x86_64.AppImage"
          ./"$out" --appimage-extract >/dev/null
          if find squashfs-root -name 'libonnxruntime.so*' | grep -q .; then
            echo "libonnxruntime bundled:"
            find squashfs-root -name 'libonnxruntime.so*'
          else
            echo "::error::libonnxruntime.so not found in the AppImage — AI demosaicing would fail at runtime"
            exit 1
          fi
          rm -rf squashfs-root

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumen-AppImage
          path: Lumen-${{ steps.version.outputs.version }}-x86_64.AppImage
          if-no-files-found: error

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        # Pull this version's section out of CHANGELOG.md (from its "## [x.y.z]"
        # heading up to the next section or the link-reference footer).
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && (/^## \[/ || /^\[[^]]*\]: /) { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Lumen-${{ steps.version.outputs.version }}-x86_64.AppImage
          body_path: RELEASE_NOTES.md

  macos-dmg:
    name: DMG (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        # Same rule as the Linux job: tag (minus "v") on a release, else the
        # project() version in CMakeLists.txt on a manual run.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$(awk '/^[[:space:]]*VERSION[[:space:]]/{print $2; exit}' CMakeLists.txt)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "VERSION=$v" >> "$GITHUB_ENV"
          echo "Version: $v"

      - name: Install libraries
        run: brew install vips libraw lensfun little-cms2 ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          modules: 'qtshadertools'
          cache: true

      - name: Fetch ONNX Runtime (CPU)
        # universal2 build so the dylib matches whatever arch the .app is built
        # for. macdeployqt bundles it into the .app (see -libpath below).
        env:
          ORT_VERSION: '1.20.1'
        run: |
          curl -fsSLO "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-universal2-${ORT_VERSION}.tgz"
          tar xf "onnxruntime-osx-universal2-${ORT_VERSION}.tgz"
          echo "ONNXRUNTIME_ROOT=$PWD/onnxruntime-osx-universal2-${ORT_VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DLUMEN_AI_DEMOSAIC=ON -DONNXRUNTIME_ROOT="$ONNXRUNTIME_ROOT"
          cmake --build build --parallel

      - name: Install .app
        run: cmake --install build --prefix dist

      - name: Bundle dependencies + build DMG
        # macdeployqt copies the Qt frameworks and the Homebrew imaging dylibs
        # into the bundle and rewrites their load paths, then packs the .dmg.
        # -libpath lets it resolve and bundle libonnxruntime.dylib too.
        run: |
          "$QT_ROOT_DIR/bin/macdeployqt" dist/lumen.app -dmg \
            "-libpath=$ONNXRUNTIME_ROOT/lib"
          mv dist/lumen.dmg "Lumen-${VERSION}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumen-dmg
          path: Lumen-${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        # This version's section of CHANGELOG.md (matches the Linux job so both
        # jobs attach the same body to the release).
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && (/^## \[/ || /^\[[^]]*\]: /) { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Lumen-${{ steps.version.outputs.version }}.dmg
          body_path: RELEASE_NOTES.md
