name: Release

# Publish the GitHub Release for a version tag, with the body taken from that
# version's CHANGELOG.md section. The artifacts are the source archives GitHub
# attaches to the tag; Lumen ships no pre-built binaries.
#
# Both platforms install with ./install.sh, which builds against the machine's
# own libvips, LibRaw and Lensfun. A bundle has to pin whatever the build image
# shipped, and that skew is not theoretical — the v0.1.0 AppImage carried libvips
# 8.12, whose vips_mapim takes no "background", so every lens correction silently
# did nothing on hosts whose own libvips was fine (see LensCorrectionNode.cpp).
# The .dmg had the same shape of risk with nobody able to test it. A
# runtime-based format (Flatpak) is the way back to a shipped binary.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # softprops/action-gh-release needs this to publish

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        # This version's section of CHANGELOG.md: from its "## [x.y.z]" heading
        # up to the next section or the link-reference footer.
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "Version: $v"
          awk -v ver="$v" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && (/^## \[/ || /^\[[^]]*\]: /) { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # An unchangelogged tag would otherwise publish an empty release.
          [ -s RELEASE_NOTES.md ] || { echo "::error::No CHANGELOG.md section for $v"; exit 1; }
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
